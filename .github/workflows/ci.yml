name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun test
      # typecheck needs the gitignored generated types: cf-typegen writes
      # worker-configuration.d.ts, the build writes src/routeTree.gen.ts.
      - run: bun run cf-typegen
      - run: bun run build
      - run: bun run typecheck
      - run: bun run lint
